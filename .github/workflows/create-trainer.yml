name: Create Trainer from Issue
on:
  issues:
    types: [opened, labeled]

jobs:
  create-trainer:
    if: contains(github.event.issue.labels.*.name, 'new-trainer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Parse issue and create trainer page
        run: |
          # Extract fields from issue body
          NAME=$(echo "${{ github.event.issue.body }}" | grep "^Name:" | cut -d':' -f2- | xargs)
          TIER=$(echo "${{ github.event.issue.body }}" | grep "^Tier:" | cut -d':' -f2- | xargs)
          ROLE=$(echo "${{ github.event.issue.body }}" | grep "^Role:" | cut -d':' -f2- | xargs)
          BIO=$(echo "${{ github.event.issue.body }}" | grep "^Bio:" | cut -d':' -f2- | xargs)
          SPECIALTIES=$(echo "${{ github.event.issue.body }}" | grep "^Specialties:" | cut -d':' -f2- | xargs)
          PHOTO_URL=$(echo "${{ github.event.issue.body }}" | grep "^Photo:" | cut -d':' -f2- | xargs)
          
          # Create filename
          FILENAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          
          # Create images folder if not exists
          mkdir -p images
          
          # Download photo
          curl -L "$PHOTO_URL" -o "images/${FILENAME}.jpg" 2>/dev/null || echo "Using placeholder"
          
          # Create trainer HTML page
          cat > "${FILENAME}.html" << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NAME_PLACEHOLDER | Virgin Active</title>
            <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
            <style>
              :root{--red:#E8192C;--black:#111;--white:#FFF;--off-white:#F7F7F5;--muted:#888;}
              *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
              body{background:var(--white);color:var(--black);font-family:"DM Sans",sans-serif;}
              nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.08);}
              .nav-logo-text{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:0.1em;color:var(--red);}
              .nav-back{display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:#666;text-decoration:none;}
              .nav-back:hover{color:var(--red);}
              .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:64px;}
              .hero-image{position:relative;overflow:hidden;}
              .hero-image img{width:100%;height:100%;object-fit:cover;object-position:center top;}
              .hero-image-overlay{position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,var(--white) 100%);}
              .hero-content{display:flex;flex-direction:column;justify-content:center;padding:4rem 3.5rem 4rem 3rem;}
              .hero-tag{display:inline-flex;align-items:center;gap:0.6rem;font-size:0.68rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:1.25rem;}
              .hero-tag::before{content:"";width:24px;height:2px;background:var(--red);}
              .hero-name{font-family:"Bebas Neue",sans-serif;font-size:clamp(4rem,8vw,7rem);line-height:0.88;letter-spacing:0.02em;}
              .hero-role{margin-top:1rem;font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);font-weight:500;}
              .hero-divider{width:48px;height:2px;background:var(--red);margin:1.75rem 0;}
              .hero-about{font-size:1rem;line-height:1.78;color:rgba(0,0,0,0.58);max-width:46ch;}
              .content{max-width:1100px;margin:0 auto;padding:5rem 2rem 6rem;}
              .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
              .skill-chip{display:flex;align-items:flex-start;gap:0.75rem;background:var(--off-white);border:1px solid rgba(0,0,0,0.08);border-radius:8px;padding:0.9rem 1.1rem;font-size:0.85rem;font-weight:500;}
              .skill-chip::before{content:"";flex-shrink:0;width:6px;height:6px;background:var(--red);border-radius:50%;margin-top:0.45rem;}
              footer{padding:2rem 2.5rem;background:#fff;border-top:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;}
              .footer-logo{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:0.15em;color:var(--red);opacity:0.5;}
              @media(max-width:900px){.hero{grid-template-columns:1fr;}.hero-image{height:65vw;}}
            </style>
          </head>
          <body>
            <nav>
              <div class="nav-logo-text">VIRGIN ACTIVE</div>
              <a href="index.html" class="nav-back">← Back to Coaches</a>
            </nav>
            <section class="hero">
              <div class="hero-image">
                <img src="images/FILENAME_PLACEHOLDER.jpg" alt="NAME_PLACEHOLDER" onerror="this.src='https://placehold.co/800x1000/f0f0f0/999?text=NAME_PLACEHOLDER'">
                <div class="hero-image-overlay"></div>
              </div>
              <div class="hero-content">
                <div class="hero-tag">Virgin Active · TIER_PLACEHOLDER</div>
                <h1 class="hero-name">NAME_PLACEHOLDER</h1>
                <div class="hero-role">ROLE_PLACEHOLDER</div>
                <div class="hero-divider"></div>
                <p class="hero-about">BIO_PLACEHOLDER</p>
              </div>
            </section>
            <div class="content">
              <div class="skills-grid">
                <div class="skill-chip">SPECIALTIES_PLACEHOLDER</div>
              </div>
            </div>
            <footer>
              <div class="footer-logo">VIRGIN ACTIVE</div>
              <p>© 2025 Virgin Active. All rights reserved.</p>
            </footer>
          </body>
          </html>
          EOF
          
          # Replace placeholders
          sed -i "s/NAME_PLACEHOLDER/$NAME/g" "${FILENAME}.html"
          sed -i "s/FILENAME_PLACEHOLDER/$FILENAME/g" "${FILENAME}.html"
          sed -i "s/TIER_PLACEHOLDER/$TIER/g" "${FILENAME}.html"
          sed -i "s/ROLE_PLACEHOLDER/$ROLE/g" "${FILENAME}.html"
          sed -i "s/BIO_PLACEHOLDER/$BIO/g" "${FILENAME}.html"
          sed -i "s/SPECIALTIES_PLACEHOLDER/$SPECIALTIES/g" "${FILENAME}.html"
          
          # Update index.html - add trainer card before <!-- NEW TRAINER -->
          sed -i "s|<!-- NEW TRAINER -->|<a href=\"${FILENAME}.html\" class=\"coach-card\"><img src=\"images/${FILENAME}.jpg\" alt=\"${NAME}\" class=\"coach-card-img\" onerror=\"this.src='https://placehold.co/300x400/1A1A1A/888?text=${NAME}'\"><div class=\"coach-card-body\"><div class=\"coach-name\">${NAME}</div><div class=\"coach-role\" style=\"color:var(--red)\">${ROLE}</div></div></a>\n<!-- NEW TRAINER -->|g" index.html
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Add trainer: ${{ github.event.issue.title }}" || echo "No changes"
          git push
          
      - name: Close issue
        uses: peter-evans/close-issue@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Trainer page created and added to index!"
          
