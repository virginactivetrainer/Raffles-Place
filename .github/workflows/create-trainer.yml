<body>
  <nav>
    <div class="nav-logo-text">VIRGIN ACTIVE</div>
    <a href="index.html" class="nav-back">← Back to Coaches</a>
  </nav>
  <section class="hero">
    <div class="hero-image">
      <img src="images/${FILENAME}.jpg" alt="${NAME}" onerror="this.src='https://placehold.co/800x1000/f0f0f0/999?text=${NAME}'">
      <div class="hero-image-overlay"></div>
    </div>
    <div class="hero-content">
      <div class="hero-tag">Virgin Active · ${TIER}</div>
