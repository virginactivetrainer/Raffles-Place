EOF
          fi
          
          # Update index.html - add trainer card to correct section
          if [[ "$TIER" == *"Senior"* ]] || [[ "$TIER" == *"senior"* ]]; then
            # Add to senior section
            sed -i "s|<!-- NEW SENIOR TRAINER -->|<a href=\"${FILENAME}.html\" class=\"coach-card\"><img src=\"images/${FILENAME}.jpg\" alt=\"${NAME}\" class=\"coach-card-img\" onerror=\"this.src='https://placehold.co/300x400/f0f0f0/999?text=${NAME}'\"><div class=\"coach-card-body\"><div class=\"coach-name\">${NAME}</div><div class=\"coach-role\" style=\"color:var(--red)\">${ROLE}</div></div></a>\n            <!-- NEW SENIOR TRAINER -->|g" index.html
          else
            # Add to certified coaches section
            sed -i "s|<!-- NEW CERTIFIED TRAINER -->|<a href=\"${FILENAME}.html\" class=\"coach-card\"><img src=\"images/${FILENAME}.jpg\" alt=\"${NAME}\" class=\"coach-card-img\" onerror=\"this.src='https://placehold.co/300x400/1A1A1A/888?text=${NAME}'\"><div class=\"coach-card-body\"><div class=\"coach-name\">${NAME}</div><div class=\"coach-role\" style=\"color:var(--red)\">${ROLE}</div></div></a>\n    <!-- NEW CERTIFIED TRAINER -->|g" index.html
          fi
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Add trainer: ${{ github.event.issue.title }}" || echo "No changes"
          git push
          
      - name: Close issue
        uses: peter-evans/close-issue@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Trainer page created and added to index!"
